<!doctype html>
<html lang="en" data-theme="w17" data-mode="light">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=JetBrains+Mono:wght@400;500&display=swap" />
		<!-- roc-grotesk via Adobe Typekit — WSM-native font for the W17 theme -->
		<link rel="stylesheet" href="https://use.typekit.net/nex7gqz.css" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<script>
			(function () {
				var root = document.documentElement;
				try {
					var storedLook = localStorage.getItem('pg.theme.look');
					var look = (storedLook === 'neon' || storedLook === 'w17' || storedLook === 'graphite') ? storedLook : 'w17';
					root.setAttribute('data-theme', look);

					// W17 is a light-only theme — force light mode
					if (look === 'w17') {
						root.setAttribute('data-mode', 'light');
					} else {
						var storedMode = localStorage.getItem('pg.theme.mode');
						var mode = storedMode === 'light' || storedMode === 'dark'
							? storedMode
							: (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
						root.setAttribute('data-mode', mode);
					}
				} catch (e) {
					root.setAttribute('data-mode', 'light');
					root.setAttribute('data-theme', 'w17');
				}
			})();
		</script>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
