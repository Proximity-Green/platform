<!doctype html>
<html lang="en" data-theme="graphite">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=JetBrains+Mono:wght@400;500&display=swap" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<script>
			(function () {
				var root = document.documentElement;
				try {
					var storedMode = localStorage.getItem('pg.theme.mode');
					var mode = storedMode === 'light' || storedMode === 'dark'
						? storedMode
						: (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
					root.setAttribute('data-mode', mode);

					var storedLook = localStorage.getItem('pg.theme.look');
					var look = storedLook === 'neon' ? 'neon' : 'graphite';
					root.setAttribute('data-theme', look);
				} catch (e) {
					root.setAttribute('data-mode', 'dark');
					root.setAttribute('data-theme', 'graphite');
				}
			})();
		</script>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
